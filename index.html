const SITES = [
    {
        id: 'lawford',
        name: 'Lawford',
        lat: 51.9378, lng: 1.0497,
        type: 'trial',
        typeLabel: 'Arrests',

        description: "The trials continued in Lawford, expanding Hopkins' territory. Lawford is famous for the\ncase of Anne West, Where her daughter, Rebecca West, was accused her mother of witchcraft."
    },
    {
        id: 'manningtree',
        name: 'Manningtree',
        lat: 51.9408, lng: 1.0627,
        type: 'base',
        typeLabel: "Hopkins' Base",
        years: '1644–1647',
        description: "Manningtree was at the centre of the Essex witch trials as the home of Witchfinder General, Matthew Hopkins. \n\nThe 17th century in England was a time between superstition and rationality, when old established ideas about the order of the universe and man's place in it were put to question.\n\nWhere the beliefs of Catholicism were challenged by Protestantism, civil war raged across the land. It was in this context fears and superstition around witches and witchcraft took hold. And in places like east anglia this has reached a new level of fear and horror. \n\nIn 1644, during the height of civil war in England, the crime of witchcraft was already a century old. During which time, there had been more trails than any other in Essex. Why?\n\nMatthew Hopkins\n\nAt the centre of the craze and mayhem for witches, were Matthew Hopkins and his assistant John Stearne, who led the revolt against witches. It is estimated that they interrogated 300 women, of which around 112 were hanged and killed. This led to their reputation of leading witchfinders,  Hopkins even naming himself 'the witchfinder general' witch is now what he's known for. \n\nElizabeth Clarke\n\nShe was accused of witchcraft, she was a young, unmarried mother who was the first woman to be persecuted as a witch, the accusation against her started the east anglian witch trails in 1645.f she s fist accused riay 21st of march, 1645. John Rivet accused larke of cursing and killing his wife.\n\n\nManningtree\n\nManningtree was at the centre of the Essex witch trials as the home of Witchfinder General, Matthew Hopkins. \n\nHopkins started to become involved in the investigation of witchcraft in 1644, after overhearing a group of women discussing their meetings with the devil at the Thorn Inn, which Hopkins had purchased after 1634, and which still stands in Mistley to this day. It is believed he bought it with his father's inheritance.\n"
    },
    {
        id: 'mistley',
        name: 'Mistley',
        lat: 51.9376, lng: 1.0893,
        type: 'trial',
        typeLabel: 'Arrests',
        years: '1644',
        description: "Hopkins carried out meetings and discussions in the White Hart Pub, while public hangings of witches were held on the green in South Street. Witches were also drowned from the 'Hopping' bridge along The Walls between Manningtree and neighbouring Mistley."
    },
    {
        id: 'colchester',
        name: 'Colchester',
        lat: 51.8959, lng: 0.8919,
        type: 'trial',
        typeLabel: 'Arrests',
        years: '1645',
        description: "Colchester is infamous for its castle, in which Hopkins and his partner Stearne imprisoned many women for being suspects, but because they were treated so badly, many people died of fear or 'prison fever' (the plague). They were held in dark, overcrowded, unsanitary cells.\nThe castle was a common way to hold suspects for a while, so that they couldn't do any more harm. However, this was extremely dramatic as most of the witches probably were innocent. It was here Elizabeth Carke was held for witchcraft, before her trial and execution, many others were held here, such as Rebecca West and Anne West, Margaret Moone, Alice Stanby and many more unnamed women."
    },
    {
        id: 'chelmsford',
        name: 'Chelmsford',
        lat: 51.7356, lng: 0.4685,
        type: 'execution',
        typeLabel: 'Trials & Executions',
        years: 'March 1645',
        description: "The most famous or infamous instance of witchcraft in Chelmsford was Agnes Waterhouse. It was said that she was one of the 'mothers of witchcraft' as she was one of the first to be tried and executed (1566). Back in those times, if a witch were to kill farm animals, that would\nbe 1 year of prison, if a witch were to kill a person, the suspect would be hanged, but the tricky thing is that back then, there was a 'mini ice age' and the plague, so many of that would have been thought to be witch fault,when it really wasn't, such may be the case for\nWaterhouse. From what we can tell from historians and such evidence back then, the court said that she killed her neighbour and husband with a familar called Sateth, when this was questioned, she said that 'Sateth' was given to her by her sister. Her daughter, Joan, was\nalso tried for witchcraft, and their neighbour, Agnes Browne,12, said that Joan sent a demonic black dog to terrorise her and, then, holding a knife or dagger (it is unclear)- it told her to commit suicide, Agnes Browne said that he turned his head to Waterhouse's home\nand said that 'his sweet dame' had sent him. To this Agnes Waterhouse said that she was lying and said 'thou liest' also mentioning that she doesn't own a knife. Many found this confusing as she had already pleaded guilty, so why does it matter? To this it is said so as to save her daughter from being burned like her. So, although she was burned, she died knowing her\ndaughter was safe."
    },
    {
        id: 'great-clacton',
        name: 'Great Clacton',
        lat: 51.7890, lng: 1.1530,
        type: 'trial',
        typeLabel: 'Arrests',
        years: '1645',
        description: "Clacton, as in life today, was quite a notable site back in the 1600s. Where Ramplings Avenue is now situated, there used to be the infamous Ware Pond, where women accused of witchcraft were brought to be tested on the ducking stool. As Peter Brown describes in his book Essex Witches, the ducking stool was seen as a foolproof way of determining whether or not a woman was a witch. 'The fear of drawing alone often brought forth a confession, but sometimes the accused would refuse to confess, and would be tied to the stool and immersed in water, usually the local pond, for two or three minutes at a time.' (Brown, p. 75)\n\n As well as being a local hotspot for accusations of witchcraft, the Clacton cases also tell us a lot about the belief in witches familiars and Imps, and the role that they played in accusing these women. \n\nWhen Anne Cate was accused of being a witch in 1645, she also confessed that her mother had given her four imps, 'James', 'Prickeare', and 'Robyn', which appeared in the form of moles, alongside 'Sparrow', a bird. These familiars supposedly encouraged Anne to renounce God and to harm her neighbours. She was accused of using her familiars to attack Robert Freeman, who went lam and died, and to kill other neighbours including John Tillet and the wife and child of Samuel Ray, amongst others. Following evidence given by her neighbours, Anne was hanged as a witch in Chelmsford in July 1645, alongside several other Clacton witches. \n\n\nFamiliars in Clacton:  \n\nMany other familiars are named in the trials of the Clacton witches, such as 'Vinegar Tom', 'Jamara', 'Holt', 'Newes', 'Many Imps', 'Sacke' and 'Sugar', and many others. The most common familiar were cats. Although it was thought that goats were very sacrilegious because it was believed that the goat was made by the devil, and in some artwork, it portrays Satan as having goat horns or even appearing as a goat. Another belief is that some witches could turn into hares or rabbits because they are sly and used to steal food and milk and in some cases 'poisin crops' what's more, is that it was also thought that, when the are together, they stand on hind legs, back then it was thought only humans could do that, so they thought witches were in disguise as rabbits. Of course, now that seems preposterous, but back then, it was quite believable.\n"

        typeLabel: 'Notable Site',
        years: '1645',
        description: " Another major site in the modern world, the port town of Harwich was also central to the 17th century witch trials. Some twenty seven women from Harwich were accused and found guilty of witchcraft, and their hanging was treated as a public spectacle in a long tradition that predated the years of unrest during the English Civil War. Large crowds gathered to watch the hangings, which were advertised on posters like visiting carnivals, with food stalls and entertainers joining the gatherings. \n\nThese women were mostly widows and spinsters, one of whom was Elizabeth Hanby, who was accused of witchcraft in April 1601. Elizabeth was the eldest of three generations of women who were believed to be descended from witches, and her daughters and grandaughters also faced charges in 1634 and 1638. "

en through their knees and elbows, which was a common method of stopping witches rising from the grave and causing further trouble in the village.' (Peter C. Brown, Essex Witches, Stroud, 2014, p. 129)"

//  STORAGE  — persists your text between browser sessions
// ═══════════════════════════════════════════════════════════════════

const STORAGE_KEY = 'hopkins-map-descriptions';

function loadSaved() {
    try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        SITES.forEach(s => { if (saved[s.id] !== undefined) s.description = saved[s.id]; });
    } catch (e) { /* ignore quota or parse errors */ }
}

function persistAll() {
    try {
        const obj = {};
        SITES.forEach(s => { obj[s.id] = s.description; });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
    } catch (e) {
        alert('Could not save: browser storage may be full.');
    }
}

loadSaved();

const map = L.map('map', {
    center: [52.15, 0.85],
    zoom: 8,

});

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Terrain_Base/MapServer/tile/{z}/{y}/{x}', {
    attribution: '&copy; <a href="https://www.esri.com/">Esri</a>, USGS, NOAA',
    maxNativeZoom: 13,  // highest zoom tiles the server provides

    minZoom: 5

// Labels-only overlay in a separate pane so it can have its own (lighter) filter

map.getPane('labelsPane').style.zIndex = 350;
map.getPane('labelsPane').style.pointerEvents = 'none';

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png', {

//  MARKERS
// ═══════════════════════════════════════════════════════════════════

const PIN_COLORS = {
    base:      '#1a0a00',
    trial:     '#8B0000',
    execution: '#4a1942',
    notable:   '#2c4a1a'
};

function lightenHex(hex, amt) {
    const n = parseInt(hex.replace('#', ''), 16);
    const r = Math.min(255, (n >> 16) + amt);
    const g = Math.min(255, ((n >>  8) & 0xff) + amt);
    const b = Math.min(255, ( n        & 0xff) + amt);
    return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function makePinSVG(color, isBase, siteId) {
    // Pin proportions
    const w  = isBase ? 26 : 20;
    const h  = isBase ? 37 : 28;
    const cx = w / 2;
    const r  = w * 0.36;      // circle radius (head)
    const cy = r + 1;         // circle centre y (1px top padding)
    const bY = h - 1;         // tip y (bottom of pin)
    const lx = cx - r;        // leftmost point of circle
    const rx = cx + r;        // rightmost point of circle

    // Path: bezier from tip → left side of circle,
    //       arc across the top,
    //       bezier back to tip.
    // The last control point of each bezier is tangent to the circle
    // (directly above / below the left/right extremes) for a smooth join.
    const path = [
        `M${cx} ${bY}`,
        `C${cx - 3} ${cy + r + 4} ${lx} ${cy + r * 0.5} ${lx} ${cy}`,
        `A${r} ${r} 0 0 1 ${rx} ${cy}`,
        `C${rx} ${cy + r * 0.5} ${cx + 3} ${cy + r + 4} ${cx} ${bY}`,
        'Z'
    ].join(' ');

    const gId  = `pin-${siteId}`;
    const light = lightenHex(color, 65);

    return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
  <defs>
    <radialGradient id="${gId}" cx="35%" cy="28%" r="65%">
      <stop offset="0%" stop-color="${light}"/>
      <stop offset="100%" stop-color="${color}"/>
    </radialGradient>
  </defs>
  <path d="${path}" fill="url(#${gId})" stroke="#f4e4bc" stroke-width="0.9"/>
  <circle cx="${cx}" cy="${cy}" r="${(r * 0.44).toFixed(1)}"
    fill="rgba(244,228,188,0.6)" stroke="rgba(244,228,188,0.85)" stroke-width="0.6"/>
</svg>`;
}

SITES.forEach(site => {
    const isBase = site.type === 'base';
    const color  = PIN_COLORS[site.type] || PIN_COLORS.trial;
    const w = isBase ? 26 : 20;
    const h = isBase ? 37 : 28;

    const icon = L.divIcon({
        html:        makePinSVG(color, isBase, site.id),
        className:   '',
        iconSize:    [w, h],
        iconAnchor:  [w / 2, h],
        popupAnchor: [0, -h]
    });

    const marker = L.marker([site.lat, site.lng], { icon }).addTo(map);

    marker.bindTooltip(site.name, {
        direction: 'top',
        className: 'map-tooltip',
        offset:    [0, -4]
    });

    marker.on('click', e => {
        L.DomEvent.stopPropagation(e);
        openPanel(site);
    });
});

// Click map background → close panel
map.on('click', closePanel);

// ═══════════════════════════════════════════════════════════════════
//  PANEL
// ═══════════════════════════════════════════════════════════════════

let currentSite = null;
let editMode    = false;

function openPanel(site) {
    currentSite = site;

    document.getElementById('panel-type').textContent = site.typeLabel;
    document.getElementById('panel-name').textContent = site.name;
    document.getElementById('panel-year').textContent = site.years;

    // Images — try {id}.png then {id}.jpg for slots 1 and 2
    const imgWrap = document.getElementById('panel-image-wrap');
    imgWrap.innerHTML = '';
    imgWrap.style.display = 'none';
    [site.id, `${site.id}-2`].forEach(name => {
        const img = document.createElement('img');
        img.className = 'panel-image';
        img.alt = '';
        img.onclick = () => openLightbox(img.src);
        img.onerror = () => {
            if (img.src.endsWith('.png')) {
                img.onerror = () => img.remove();
                img.src = `./hopkins-images/${name}.jpg`;
            } else {
                img.remove();
            }
            if (!imgWrap.querySelector('img')) imgWrap.style.display = 'none';
        };
        img.onload = () => { imgWrap.style.display = 'block'; };
        img.src = `./hopkins-images/${name}.png`;
        imgWrap.appendChild(img);
    });

    const descEl    = document.getElementById('panel-description');
    const areaEl    = document.getElementById('panel-textarea');
    const saveEl    = document.getElementById('panel-save');
    const confirmEl = document.getElementById('save-confirm');

    confirmEl.style.display = 'none';

    if (editMode) {
        descEl.style.display = 'none';
        areaEl.style.display = 'block';
        saveEl.style.display = 'block';
        areaEl.value = site.description;
    } else {
        areaEl.style.display = 'none';
        saveEl.style.display = 'none';
        descEl.style.display = 'block';

        if (site.description.trim()) {
            descEl.className   = '';
            descEl.textContent = site.description;
        } else {
            descEl.className   = 'empty';
            descEl.textContent = 'No record yet entered for this site.\n\nActivate Edit Mode to add your account.';
        }
    }

    document.getElementById('info-panel').classList.add('open');
}

function closePanel() {
    document.getElementById('info-panel').classList.remove('open');
}

function saveDescription() {
    if (!currentSite) return;
    currentSite.description = document.getElementById('panel-textarea').value;
    persistAll();

    const confirmEl = document.getElementById('save-confirm');
    confirmEl.style.display = 'block';
    setTimeout(() => { confirmEl.style.display = 'none'; }, 2000);
}

function toggleEditMode() {
    editMode = !editMode;
    const toggleBtn = document.getElementById('edit-toggle');
    const exportBtn = document.getElementById('export-btn');
    toggleBtn.classList.toggle('active', editMode);
    toggleBtn.textContent = editMode ? '✎ Editing…' : '✎ Edit Mode';
    exportBtn.style.display = editMode ? 'block' : 'none';
    if (currentSite) openPanel(currentSite);
}

function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
});

function exportData() {
    const obj = {};
    SITES.forEach(s => { obj[s.id] = s.description; });
    const blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'hopkins-map-data.json';
    a.click();
    URL.revokeObjectURL(url);
}
</script>
